<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>北捷模擬器轉換器 - 修復版</title>
    <style>
        :root { --primary-color: #0084ff; --bg-color: #f4f7f9; }
        body { font-family: 'PingFang TC', 'Microsoft JhengHei', sans-serif; background-color: var(--bg-color); display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        .card { background: white; padding: 2rem; border-radius: 16px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); width: 90%; max-width: 400px; text-align: center; }
        h2 { margin-top: 0; color: #333; font-size: 1.5rem; }
        .hint { font-size: 0.9rem; color: #666; margin-bottom: 10px; text-align: left; }
        input { width: 100%; padding: 12px; margin: 8px 0; border: 2px solid #ddd; border-radius: 8px; box-sizing: border-box; font-size: 16px; }
        input:focus { border-color: var(--primary-color); outline: none; }
        button { width: 100%; padding: 12px; background-color: var(--primary-color); color: white; border: none; border-radius: 8px; font-size: 16px; font-weight: bold; cursor: pointer; margin-top: 10px; }
        #result-area { margin-top: 20px; display: none; border-radius: 8px; padding: 15px; background: #f8f9fa; border: 1px dashed #ccc; }
        .id-display { font-size: 24px; font-weight: bold; color: #222; margin: 10px 0; display: block; }
        .copy-btn { background-color: #28a745; margin-top: 5px; font-size: 14px; padding: 8px; width: auto; display: inline-block; min-width: 120px; }
        .status-msg { font-size: 14px; color: #666; margin-top: 10px; min-height: 20px; }
        footer { margin-top: 25px; font-size: 0.8rem; color: #999; border-top: 1px solid #eee; padding-top: 15px; }
    </style>
</head>
<body>

<div class="card">
    <h2>北捷模擬器轉換器</h2>
    <div class="hint">請輸入玩家名稱（例如：@roblox）：</div>
    <input type="text" id="username" placeholder="@使用者名稱" spellcheck="false">
    <button onclick="lookup()">查詢 ID</button>
    
    <div id="result-area">
        <span id="display-name" style="font-size: 12px; color: #0084ff; font-weight: bold;"></span><br>
        <span style="font-size: 14px; color: #666;">轉換後的 ID：</span>
        <span id="id-value" class="id-display">----</span>
        <button class="copy-btn" onclick="copyId()">點擊複製 ID</button>
    </div>
    
    <div id="status" class="status-msg"></div>

    <footer>
        開發團隊：<span style="color:#555; font-weight:bold;">元界創想 is Gemini</span>
    </footer>
</div>

<script>
    async function lookup() {
        let username = document.getElementById('username').value.trim().replace('@', '');
        const resultArea = document.getElementById('result-area');
        const idValue = document.getElementById('id-value');
        const status = document.getElementById('status');
        const displayName = document.getElementById('display-name');

        if (!username) {
            status.innerText = "❌ 請輸入名稱！";
            return;
        }

        status.innerText = "⏳ 正在嘗試連線 (Proxy 1)...";
        status.style.color = "#666";
        resultArea.style.display = 'none';

        const targetUrl = 'https://users.roblox.com/v1/usernames/users';
        const payload = { usernames: [username], excludeBannedUsers: false };

        // 嘗試不同的 Proxy
        const proxies = [
            `https://corsproxy.io/?${encodeURIComponent(targetUrl)}`,
            `https://api.allorigins.win/raw?url=${encodeURIComponent(targetUrl)}`
        ];

        for (let url of proxies) {
            try {
                const response = await fetch(url, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json', 'Accept': 'application/json' },
                    body: JSON.stringify(payload)
                });

                if (!response.ok) throw new Error("代理伺服器拒絕請求");

                const data = await response.json();

                if (data.data && data.data.length > 0) {
                    const user = data.data[0];
                    idValue.innerText = user.id;
                    displayName.innerText = `玩家：${user.displayName} (@${user.name})`;
                    resultArea.style.display = 'block';
                    status.innerText = "✅ 查詢成功";
                    status.style.color = "#28a745";
                    return; // 成功後直接跳出迴圈
                } else {
                    status.innerText = "❌ 找不到玩家，請確認拼字。";
                    status.style.color = "#d9534f";
                    return;
                }
            } catch (err) {
                console.warn(`嘗試代理失敗: ${url}`);
                status.innerText = "⏳ 代理 1 失敗，嘗試代理 2...";
            }
        }

        status.innerText = "⚠️ 請求失敗。請檢查網路或稍後再試。";
        status.style.color = "#d9534f";
    }

    async function copyId() {
        const idText = document.getElementById('id-value').innerText;
        const btn = document.querySelector('.copy-btn');
        
        try {
            await navigator.clipboard.writeText(idText);
            btn.innerText = "✅ 已複製！";
            setTimeout(() => btn.innerText = "點擊複製 ID", 2000);
        } catch (err) {
            // 備用方案
            const temp = document.createElement("input");
            temp.value = idText;
            document.body.appendChild(temp);
            temp.select();
            document.execCommand("copy");
            document.body.removeChild(temp);
            btn.innerText = "✅ 已複製！";
            setTimeout(() => btn.innerText = "點擊複製 ID", 2000);
        }
    }
</script>

</body>
</html>
