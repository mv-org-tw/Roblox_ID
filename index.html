<script>
    async function lookup() {
        const usernameInput = document.getElementById('username');
        const resultArea = document.getElementById('result-area');
        const idValue = document.getElementById('id-value');
        const status = document.getElementById('status');
        
        let username = usernameInput.value.trim();

        // 1. 清理輸入值
        if (username.startsWith('@')) {
            username = username.substring(1);
        }

        if (!username) {
            status.innerText = "❌ 請輸入名稱！";
            status.style.color = "#d9534f";
            resultArea.style.display = 'none';
            return;
        }

        status.innerText = "🔍 正在搜尋中...";
        status.style.color = "#666";
        resultArea.style.display = 'none';

        // 2. 使用更可靠的 CORS 代理處理 POST 請求
        // 注意：Roblox API 必須接收 JSON 格式
        const apiUrl = 'https://users.roblox.com/v1/usernames/users';
        const proxyUrl = `https://api.allorigins.win/get?url=${encodeURIComponent(apiUrl)}`;

        try {
            // 這裡改用 POST 邏輯，或透過 allorigins 獲取內容
            // 為簡化並提高成功率，改用 allorigins 的封裝
            const response = await fetch('https://corsproxy.io/?' + encodeURIComponent(apiUrl), {
                method: 'POST',
                headers: {
                    'Accept': 'application/json',
                    'Content-Type': 'application/json'
                },
                body: JSON.stringify({
                    usernames: [username],
                    excludeBannedUsers: false
                })
            });

            if (!response.ok) throw new Error("伺服器無回應");

            const data = await response.json();

            // 3. 檢查資料完整性
            if (data.data && data.data.length > 0) {
                const user = data.data[0];
                idValue.innerText = user.id;
                resultArea.style.display = 'block';
                status.innerText = `✅ 找到玩家：${user.displayName || user.name}`;
                status.style.color = "#28a745";
            } else {
                status.innerText = "❌ 找不到該玩家，請檢查拼字。";
                status.style.color = "#d9534f";
            }
        } catch (err) {
            console.error("Error:", err);
            status.innerText = "⚠️ 轉換失敗。可能是代理伺服器忙碌，請稍後再試。";
            status.style.color = "#d9534f";
        }
    }

    // 複製功能建議使用現代 API 並提供備案
    async function copyId() {
        const idText = document.getElementById('id-value').innerText;
        const btn = document.querySelector('.copy-btn');
        
        try {
            await navigator.clipboard.writeText(idText);
            showSuccess(btn);
        } catch (err) {
            // 備用方案
            const tempInput = document.createElement("input");
            tempInput.value = idText;
            document.body.appendChild(tempInput);
            tempInput.select();
            document.execCommand("copy");
            document.body.removeChild(tempInput);
            showSuccess(btn);
        }
    }

    function showSuccess(btn) {
        const originalText = btn.innerText;
        btn.innerText = "✅ 已複製！";
        btn.style.backgroundColor = "#1e7e34";
        setTimeout(() => {
            btn.innerText = originalText;
            btn.style.backgroundColor = "#28a745";
        }, 2000);
    }
</script>
